<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048 Remix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     THEME — change these to restyle the whole game
     ============================================================ */
  :root {
    --bg: #eaf4fb;            /* page background */
    --ink: #2b3a4a;           /* main text */
    --panel: #7fb6dd;         /* score panels */
    --panel-text: #ffffff;
    --board: #5d9ec9;         /* board frame */
    --cell: #cde4f2;          /* empty cell */
    --tile-bg: #ffffff;       /* tile card */
    --accent: #ff8a5c;        /* buttons */
    --accent-dark: #e9744a;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Fredoka', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 24px 12px 48px;
    touch-action: none; /* we handle swipes ourselves */
  }

  .app { width: min(92vw, 460px); }

  header h1 {
    font-size: clamp(2.2rem, 9vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -1px;
  }
  header h1 span { color: var(--accent); }

  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 16px 0 10px;
  }
  .score-box {
    background: var(--panel);
    color: var(--panel-text);
    border-radius: var(--radius);
    text-align: center;
    padding: 10px 8px;
  }
  .score-box .label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .score-box .value {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
    min-height: 1.2em;
  }
  .score-box .value.small { font-size: 1.05rem; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0 14px;
  }
  .toolbar p { font-size: 1.05rem; }
  .toolbar p b { font-weight: 700; }

  button {
    font-family: inherit;
    font-weight: 600;
    font-size: 1rem;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: var(--accent-dark); }
  button:active { transform: scale(0.96); }
  button:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }

  /* ---------- board ---------- */
  .board-wrap { position: relative; }

  .board {
    position: relative;
    background: var(--board);
    border-radius: var(--radius);
    padding: var(--gap);
    width: 100%;
    aspect-ratio: 1;
    --gap: 10px;
    --cell-size: calc((100% - 5 * var(--gap)) / 4);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    width: 100%;
    height: 100%;
  }
  .grid .cell {
    background: var(--cell);
    border-radius: 10px;
  }

  .tile {
    position: absolute;
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 10px;
    background: var(--tile-bg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: top 0.12s ease, left 0.12s ease;
    will-change: top, left;
  }
  .tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 6%;
    pointer-events: none;
  }
  .tile .fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-align: center;
  }
  .tile .fallback .emoji { font-size: clamp(1.6rem, 9vw, 2.6rem); line-height: 1; }
  .tile .fallback .name  { font-size: 0.6rem; font-weight: 600; padding: 0 4px; }
  .tile.no-img img { display: none; }
  .tile.no-img .fallback { display: flex; }

  .tile.new   { animation: pop-in 0.18s ease; }
  .tile.merged{ animation: pop-merge 0.22s ease; }

  @keyframes pop-in    { from { transform: scale(0); }   to { transform: scale(1); } }
  @keyframes pop-merge { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }

  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none; animation: none !important; }
  }

  /* ---------- overlays ---------- */
  .overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: rgba(234, 244, 251, 0.88);
    backdrop-filter: blur(2px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 20px;
    z-index: 5;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 1.8rem; font-weight: 700; }
  .overlay .buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  footer {
    margin-top: 16px;
    font-size: 0.85rem;
    opacity: 0.75;
    text-align: center;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>2048 <span>Remix</span></h1>
  </header>

  <div class="scores">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
    <div class="score-box">
      <div class="label">Current top</div>
      <div class="value small" id="current-tile">—</div>
    </div>
    <div class="score-box">
      <div class="label">Best ever</div>
      <div class="value small" id="best-tile">—</div>
    </div>
  </div>

  <div class="toolbar">
    <p>Join the <b>pictures!</b></p>
    <button id="new-game">Play again</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="grid" id="grid"></div>
      <div class="overlay" id="win-overlay">
        <h2 id="win-title">You reached the top!</h2>
        <div class="buttons">
          <button id="keep-going">Keep going</button>
          <button id="win-restart">Play again</button>
        </div>
      </div>
      <div class="overlay" id="lose-overlay">
        <h2>No moves left</h2>
        <div class="buttons">
          <button id="lose-restart">Play again</button>
        </div>
      </div>
    </div>
  </div>

  <footer>Arrow keys, WASD, or swipe to move. Matching pictures merge into the next one.</footer>
</div>

<script>
/* ============================================================
   TILE RANKING — edit this list to change your game.
   Order = lowest to highest. Drop matching files into /images
   (tile-1.png, tile-2.png, ...). If an image is missing, the
   emoji + name show instead, so the game always works.
   ============================================================ */
const TILES = [
  { name: 'Sunshine',     emoji: '\u2600\uFE0F',  img: 'images/tile-1.png' },
  { name: 'Puppy',        emoji: '\uD83D\uDC36',  img: 'images/tile-2.png' },
  { name: 'Duomo',        emoji: '\uD83C\uDFDB\uFE0F', img: 'images/tile-3.png' },
  { name: 'Flatirons',    emoji: '\u26F0\uFE0F',  img: 'images/tile-4.png' },
  { name: 'Knicks',       emoji: '\uD83C\uDFC0',  img: 'images/tile-5.png' },
  { name: 'Beach day',    emoji: '\uD83C\uDFD6\uFE0F', img: 'images/tile-6.png' },
  { name: 'Cup of tea',   emoji: '\uD83C\uDF75',  img: 'images/tile-7.png' },
  { name: 'Spicy marg',   emoji: '\uD83C\uDF79',  img: 'images/tile-8.png' },
  { name: 'Ski day',      emoji: '\uD83C\uDFBF',  img: 'images/tile-9.png' },
];
const WIN_LEVEL = TILES.length; // reaching the last tile wins (then you can keep going)

const SIZE = 4;

/* ---------- safe localStorage (works even if storage is blocked) ---------- */
const store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
};

/* ---------- state ---------- */
let cells = [];        // 4x4 array of tile objects or null
let tileId = 0;
let score = 0;
let best = parseInt(store.get('remix-best') || '0', 10);
let bestLevel = parseInt(store.get('remix-best-level') || '0', 10);
let won = false;
let keepPlaying = false;
let animating = false;

const boardEl = document.getElementById('board');
const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const currentTileEl = document.getElementById('current-tile');
const bestTileEl = document.getElementById('best-tile');
const winOverlay = document.getElementById('win-overlay');
const loseOverlay = document.getElementById('lose-overlay');

for (let i = 0; i < SIZE * SIZE; i++) {
  const c = document.createElement('div');
  c.className = 'cell';
  gridEl.appendChild(c);
}

/* ---------- helpers ---------- */
function emptyPositions() {
  const out = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!cells[r][c]) out.push({ r, c });
  return out;
}

function addRandomTile() {
  const empty = emptyPositions();
  if (!empty.length) return;
  const { r, c } = empty[Math.floor(Math.random() * empty.length)];
  const level = Math.random() < 0.9 ? 1 : 2;
  cells[r][c] = { id: ++tileId, level, r, c, isNew: true, mergedFrom: null };
}

function highestLevel() {
  let h = 0;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (cells[r][c]) h = Math.max(h, cells[r][c].level);
  return h;
}

function tileInfo(level) { return TILES[Math.min(level, TILES.length) - 1]; }

/* ---------- rendering ---------- */
function posStyle(r, c) {
  const gap = 10;
  const inner = boardEl.clientWidth - gap * (SIZE + 1);
  const size = inner / SIZE;
  return {
    top: gap + r * (size + gap) + 'px',
    left: gap + c * (size + gap) + 'px'
  };
}

const tileEls = new Map(); // id -> element

function render() {
  const seen = new Set();
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const t = cells[r][c];
      if (!t) continue;
      seen.add(t.id);
      let el = tileEls.get(t.id);
      const info = tileInfo(t.level);
      if (!el) {
        el = document.createElement('div');
        el.className = 'tile';
        el.innerHTML =
          '<img alt="">' +
          '<div class="fallback"><div class="emoji"></div><div class="name"></div></div>';
        const img = el.querySelector('img');
        img.onerror = () => el.classList.add('no-img');
        boardEl.appendChild(el);
        tileEls.set(t.id, el);
        const p = posStyle(t.r, t.c);
        el.style.top = p.top; el.style.left = p.left;
      }
      if (el.dataset.level !== String(t.level)) {
        el.dataset.level = t.level;
        el.classList.remove('no-img');
        const img = el.querySelector('img');
        img.src = info.img;
        img.alt = info.name;
        el.querySelector('.fallback .emoji').textContent = info.emoji;
        el.querySelector('.fallback .name').textContent = info.name;
      }
      const p = posStyle(t.r, t.c);
      el.style.top = p.top; el.style.left = p.left;
      el.classList.toggle('new', !!t.isNew);
      el.classList.toggle('merged', !!t.mergedFrom);
      t.isNew = false;
      t.mergedFrom = null;
    }
  }
  for (const [id, el] of tileEls) {
    if (!seen.has(id)) { el.remove(); tileEls.delete(id); }
  }
  scoreEl.textContent = score;
  bestEl.textContent = best;
  const h = highestLevel();
  currentTileEl.textContent = h ? tileInfo(h).name : '—';
  bestTileEl.textContent = bestLevel ? tileInfo(bestLevel).name : '—';
}

/* ---------- moves ---------- */
function move(dr, dc) {
  if (animating) return;
  if (winOverlay.classList.contains('show') || loseOverlay.classList.contains('show')) return;

  const order = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) order.push({ r, c });
  // traverse from the far edge in the move direction
  if (dr === 1) order.sort((a, b) => b.r - a.r);
  if (dr === -1) order.sort((a, b) => a.r - b.r);
  if (dc === 1) order.sort((a, b) => b.c - a.c);
  if (dc === -1) order.sort((a, b) => a.c - b.c);

  let moved = false;
  const mergedThisTurn = new Set();

  for (const { r, c } of order) {
    const t = cells[r][c];
    if (!t) continue;
    let nr = r, nc = c;
    while (true) {
      const tr = nr + dr, tc = nc + dc;
      if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
      const target = cells[tr][tc];
      if (!target) { nr = tr; nc = tc; continue; }
      if (target.level === t.level && !mergedThisTurn.has(target.id)) {
        // merge into target
        cells[r][c] = null;
        target.level += 1;
        target.mergedFrom = t.id;
        mergedThisTurn.add(target.id);
        score += Math.pow(2, target.level);
        if (score > best) { best = score; store.set('remix-best', String(best)); }
        if (target.level > bestLevel) {
          bestLevel = target.level;
          store.set('remix-best-level', String(bestLevel));
        }
        // animate the moving tile to the target cell, then remove
        const el = tileEls.get(t.id);
        if (el) {
          const p = posStyle(tr, tc);
          el.style.top = p.top; el.style.left = p.left;
          setTimeout(() => { el.remove(); tileEls.delete(t.id); }, 120);
        }
        moved = true;
        if (target.level >= WIN_LEVEL && !won && !keepPlaying) {
          won = true;
        }
        t.consumed = true;
        break;
      }
      break;
    }
    if (!t.consumed && (nr !== r || nc !== c)) {
      cells[r][c] = null;
      t.r = nr; t.c = nc;
      cells[nr][nc] = t;
      moved = true;
    } else {
      t.r = r; t.c = c;
    }
    delete t.consumed;
  }

  if (!moved) return;

  animating = true;
  render(); // slide animation
  setTimeout(() => {
    addRandomTile();
    render();
    animating = false;
    if (won && !keepPlaying) {
      document.getElementById('win-title').textContent =
        'You reached ' + TILES[TILES.length - 1].name + '!';
      winOverlay.classList.add('show');
    } else if (isGameOver()) {
      loseOverlay.classList.add('show');
    }
  }, 130);
}

function isGameOver() {
  if (emptyPositions().length) return false;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const t = cells[r][c];
      if (r + 1 < SIZE && cells[r + 1][c].level === t.level) return false;
      if (c + 1 < SIZE && cells[r][c + 1].level === t.level) return false;
    }
  }
  return true;
}

/* ---------- game lifecycle ---------- */
function newGame() {
  cells = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  for (const [, el] of tileEls) el.remove();
  tileEls.clear();
  score = 0;
  won = false;
  keepPlaying = false;
  winOverlay.classList.remove('show');
  loseOverlay.classList.remove('show');
  addRandomTile();
  addRandomTile();
  render();
}

document.getElementById('new-game').addEventListener('click', newGame);
document.getElementById('win-restart').addEventListener('click', newGame);
document.getElementById('lose-restart').addEventListener('click', newGame);
document.getElementById('keep-going').addEventListener('click', () => {
  keepPlaying = true;
  winOverlay.classList.remove('show');
});

/* ---------- input ---------- */
window.addEventListener('keydown', (e) => {
  const map = {
    ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
    w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1]
  };
  const dir = map[e.key];
  if (dir) { e.preventDefault(); move(dir[0], dir[1]); }
});

let touchStart = null;
boardEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1)
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
boardEl.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) move(0, dx > 0 ? 1 : -1);
  else move(dy > 0 ? 1 : -1, 0);
});

window.addEventListener('resize', render);

newGame();
</script>
</body>
</html>
